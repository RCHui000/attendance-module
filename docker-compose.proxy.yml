services:
  psa-reverse-proxy:
    image: nginx:1.27-alpine
    container_name: psa-reverse-proxy
    restart: unless-stopped
    ports:
      - "${PROXY_HTTP_PORT:-8080}:80"
    volumes:
      - ./ops/reverse-proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 3
