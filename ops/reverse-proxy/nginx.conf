events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  client_max_body_size 20m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream psa_web {
    server host.docker.internal:8767;
  }

  upstream psa_gotrue {
    server host.docker.internal:8777;
  }

  upstream psa_postgrest {
    server host.docker.internal:8779;
  }

  upstream psa_realtime {
    server host.docker.internal:8778;
  }

  server {
    listen 80;
    server_name _;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    location = /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    location /auth/ {
      proxy_pass http://psa_gotrue/;
      proxy_set_header Connection "";
      proxy_read_timeout 60s;
    }

    location /rest/ {
      proxy_pass http://psa_postgrest/;
      proxy_set_header Connection "";
      proxy_read_timeout 120s;
    }

    location /realtime/ {
      proxy_pass http://psa_realtime/;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_buffering off;
    }

    location / {
      proxy_pass http://psa_web;
      proxy_set_header Connection "";
      proxy_read_timeout 120s;
    }
  }
}
