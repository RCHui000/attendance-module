# Supabase PSA — Self-hosted on NAS (minimal stack)

services:
  # Core database
  postgres:
    image: postgres:16-alpine
    container_name: psa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: psa
      POSTGRES_USER: psa_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U psa_admin -d psa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Supabase Auth (GoTrue)
  gotrue:
    image: supabase/gotrue:v2.164.0
    container_name: psa-gotrue
    restart: unless-stopped
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: "postgres://psa_admin:${POSTGRES_PASSWORD}@postgres:5432/psa?sslmode=disable"
      GOTRUE_SITE_URL: "http://192.168.2.100:8767"
      GOTRUE_JWT_SECRET: ${JWT_SECRET}
      GOTRUE_JWT_EXP: 86400
      GOTRUE_DISABLE_SIGNUP: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMTP_ADMIN_EMAIL: admin@psa.local
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "false"
      GOTRUE_EXTERNAL_GITHUB_ENABLED: "false"
      API_EXTERNAL_URL: "http://192.168.2.100:8777"
      GOTRUE_EXTERNAL_URL: "http://192.168.2.100:8777"
    ports:
      - "8777:9999"
    depends_on:
      postgres:
        condition: service_healthy

  # Supabase Realtime
  realtime:
    image: supabase/realtime:v2.33.70
    container_name: psa-realtime
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: psa_admin
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_NAME: psa
      DB_SSL: "false"
      SECURE_CHANNELS: "true"
      JWT_SECRET: ${JWT_SECRET}
      REPLICATION_MODE: RLS
      REPLICATION_POLL_INTERVAL: 100
    ports:
      - "8778:4000"
    depends_on:
      postgres:
        condition: service_healthy

  # PostgREST (REST API)
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: psa-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: "postgres://psa_admin:${POSTGRES_PASSWORD}@postgres:5432/psa"
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8779:3000"
    depends_on:
      postgres:
        condition: service_healthy
